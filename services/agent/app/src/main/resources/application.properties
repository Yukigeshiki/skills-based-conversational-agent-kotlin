server.port=9090

# CORS
cors.allowed-origins=http://localhost:*,http://127.0.0.1:*

spring.application.name=agent-service

spring.threads.virtual.enabled=true
spring.main.keep-alive=true

# OpenAPI/Swagger Documentation
springdoc.packages-to-scan=io.robothouse.agent.controller
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# Logging levels (pattern and appenders configured in logback-spring.xml)
logging.level.org.springframework.web=INFO

# Tell Spring to throw NoHandlerFoundException for 404s instead of default handling
spring.web.resources.add-mappings=false

spring.output.ansi.enabled=always

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.jmx.exposure.include=*

management.endpoint.health.access=read_only
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

management.endpoint.health.group.readiness.include=readinessState
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.show-details=always
management.endpoint.health.group.liveness.show-details=never

management.endpoints.web.base-path=/actuator
management.endpoints.web.path-mapping.health=/health

management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true

management.endpoints.web.exposure.exclude=env,beans

# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/agent_db
spring.datasource.username=agent
spring.datasource.password=agent
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Conversation Memory
conversation.memory.max-messages=50
conversation.memory.ttl-hours=24

# Agent
agent.max-iterations=10
agent.tool-execution-timeout-seconds=120
agent.max-plan-steps=10
agent.checkpointing-enabled=true
agent.max-delegation-depth=2

# HTTP Tool HTTP Client
http-tool.http.connect-timeout-seconds=10

# HTTP Tool Failsafe Resilience
http-tool.failsafe.retry-delay-seconds=1
http-tool.failsafe.retry-max-retries=2
http-tool.failsafe.circuit-breaker-failure-threshold=5
http-tool.failsafe.circuit-breaker-delay-seconds=60
http-tool.failsafe.circuit-breaker-success-threshold=2
http-tool.failsafe.rate-limiter-max-executions=50
http-tool.failsafe.rate-limiter-period-seconds=60
http-tool.failsafe.rate-limiter-max-wait-time-seconds=5
http-tool.failsafe.bulkhead-max-concurrency=10
http-tool.failsafe.bulkhead-max-wait-time-seconds=5

# Skill Routing
skill.routing.min-similarity-threshold=0.60
skill.routing.min-token-overlap-ratio=0.3

# Skill References (RAG)
skill.reference.chunk-target-tokens=500
skill.reference.chunk-overlap-tokens=50
skill.reference.retrieval-max-results=5
skill.reference.retrieval-min-score=0.5

# Embedding
embedding.dimension=1536

# OpenAI Embedding Model
openai.api-key=${OPENAI_API_KEY:}
openai.embedding-model=text-embedding-3-small

# Chat Model Configuration
agent.models.api-key=${ANTHROPIC_API_KEY:}
agent.models.log-requests=false
agent.models.log-responses=false
agent.models.timeout-seconds=120
agent.models.agent.model-name=claude-sonnet-4-6
agent.models.agent.temperature=0.7
agent.models.agent.max-tokens=4096
agent.models.light.model-name=claude-haiku-4-5-20251001
agent.models.light.temperature=0.3
agent.models.light.max-tokens=4096

# LLM Retry
agent.models.retry.max-attempts=4
agent.models.retry.initial-delay-ms=1000
agent.models.retry.max-delay-ms=30000
agent.models.retry.delay-factor=2.0
agent.models.retry.jitter-factor=0.5
agent.models.retry.attempt-timeout-ms=120000
