spring.application.name=agent-service-test

# CORS
cors.allowed-origins=http://localhost:*

server.port=0

logging.level.io.robothouse.agent=DEBUG
logging.level.org.springframework.web=DEBUG

# Dummy API key for test context
agent.models.api-key=test-dummy-key
agent.models.log-requests=false
agent.models.log-responses=false
agent.models.timeout-seconds=120
agent.models.agent.model-name=claude-sonnet-4-6
agent.models.agent.temperature=0.7
agent.models.agent.max-tokens=4096
agent.models.light.model-name=claude-haiku-4-5-20251001
agent.models.light.temperature=0.3
agent.models.light.max-tokens=4096

# LLM Retry (effectively disabled in tests via maxAttempts=1)
agent.models.retry.max-attempts=1
agent.models.retry.initial-delay-ms=1
agent.models.retry.max-delay-ms=10
agent.models.retry.delay-factor=1.5
agent.models.retry.jitter-factor=0.0
agent.models.retry.attempt-timeout-ms=60000

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Skill routing
skill.routing.min-similarity-threshold=0.60
skill.routing.min-token-overlap-ratio=0.3

# Skill References (RAG)
skill.reference.chunk-target-tokens=500
skill.reference.chunk-overlap-tokens=50
skill.reference.retrieval-max-results=5
skill.reference.retrieval-min-score=0.5

# Disable skill seeder in tests
skill.seeder.enabled=false

# HTTP Tool HTTP Client
http-tool.http.connect-timeout-seconds=5

# HTTP Tool Failsafe
http-tool.failsafe.retry-delay-seconds=1
http-tool.failsafe.retry-max-retries=1
http-tool.failsafe.circuit-breaker-failure-threshold=3
http-tool.failsafe.circuit-breaker-delay-seconds=10
http-tool.failsafe.circuit-breaker-success-threshold=1
http-tool.failsafe.rate-limiter-max-executions=100
http-tool.failsafe.rate-limiter-period-seconds=60
http-tool.failsafe.rate-limiter-max-wait-time-seconds=2
http-tool.failsafe.bulkhead-max-concurrency=5
http-tool.failsafe.bulkhead-max-wait-time-seconds=2
