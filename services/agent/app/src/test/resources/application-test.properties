spring.application.name=agent-service-test

server.port=0

logging.level.io.robothouse.agent=DEBUG
logging.level.org.springframework.web=DEBUG

# Dummy API key for test context
langchain4j.anthropic.chat-model.api-key=test-dummy-key
langchain4j.anthropic.chat-model.log-requests=false
langchain4j.anthropic.chat-model.log-responses=false

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Disable skill seeder in tests
skill.seeder.enabled=false
