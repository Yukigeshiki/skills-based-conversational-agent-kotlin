spring.application.name=agent-service-integration

logging.level.io.robothouse.agent=DEBUG

# Dummy API key - not used in integration tests
langchain4j.anthropic.chat-model.api-key=test-dummy-key
langchain4j.anthropic.chat-model.log-requests=false
langchain4j.anthropic.chat-model.log-responses=false

# DataSource configured dynamically by testcontainers
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Skill routing
skill.routing.min-similarity-score=0.5
skill.routing.fallback-skill-name=general-assistant

# Disable skill seeder in tests
skill.seeder.enabled=false
